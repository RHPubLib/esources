<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Research Databases</title>
  <meta name="referrer" content="no-referrer-when-downgrade">
  <style>
    :root {
      --teal: #006978;
      --teal-dark: #004f5b;
      --teal-bg: #f1f7f8;
      --ink: #1f2933;
      --muted: #5c6b7a;
      --line: #d9e0e6;
      --card-border: #c6dbe0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; background: transparent; color: var(--ink);
      font: 18px/1.55 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    a { color: var(--teal); }
    a:hover { color: var(--teal-dark); }

    .wrap {
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px 24px 40px;
    }

    h1.page-title {
      color: var(--teal);
      font-size: 2.25rem;
      font-weight: 700;
      margin: 0 0 28px;
    }

    /* --- Two-column layout: sidebar + grid --- */
    .layout {
      display: grid;
      grid-template-columns: 230px 1fr;
      gap: 36px;
      align-items: start;
    }
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; gap: 16px; }
    }

    /* --- Sidebar filter --- */
    .sidebar-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--ink);
      margin: 0 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--line);
    }
    .cat-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .cat-list li { margin: 0; }
    .cat-list button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: 0;
      padding: 8px 10px;
      margin: 0;
      font: inherit;
      color: var(--ink);
      cursor: pointer;
      border-radius: 6px;
    }
    .cat-list button:hover {
      background: var(--teal-bg);
      color: var(--teal-dark);
    }
    .cat-list button.active {
      background: var(--teal);
      color: #fff;
      font-weight: 600;
    }
    .cat-list .count {
      color: var(--muted);
      font-size: 1em;
      margin-left: 6px;
    }
    .cat-list button.active .count {
      color: rgba(255,255,255,0.85);
    }
    /* Hidden on desktop; revealed at phone width. */
    .mobile-toggle { display: none; }

    @media (max-width: 720px) {
      /* The toggle button replaces the title visually but the heading
         stays in the DOM for accessibility / screen readers. */
      .sidebar-title {
        position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
        overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
      .mobile-toggle {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 12px 14px;
        background: #fff;
        border: 1px solid var(--card-border);
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        color: var(--ink);
        cursor: pointer;
        text-align: left;
      }
      .mobile-toggle-caret { transition: transform 0.15s ease; }
      .sidebar.cat-open .mobile-toggle-caret { transform: rotate(180deg); }
      .cat-list {
        display: none;
        margin-top: 8px;
        background: #fff;
        border: 1px solid var(--card-border);
        border-radius: 8px;
        overflow: hidden;
      }
      .sidebar.cat-open .cat-list { display: block; }
      .cat-list button {
        border-radius: 0;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
      }
      .cat-list li:last-child button { border-bottom: 0; }
      @media (prefers-reduced-motion: reduce) {
        .mobile-toggle-caret { transition: none; }
      }
    }

    /* --- Cards grid ---
       auto-fit packs as many ~380px-min columns as the grid container
       can hold: 1 col on phones, 2 cols at typical desktop widths,
       3 cols once the iframe itself is wide enough (~1500px+). */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--teal-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 22px 22px 18px;
      display: flex;
      flex-direction: column;
      min-height: 220px;
    }
    .card-head {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 10px;
    }
    .card h3 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      color: var(--teal-dark);
    }
    .card h3 a {
      color: inherit;
      text-decoration: none;
    }
    .card h3 a:hover,
    .card h3 a:focus {
      text-decoration: underline;
      color: var(--teal);
    }
    .card-cats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 12px;
    }
    .card-cat {
      background: #fff;
      color: var(--teal-dark);
      border: 1px solid var(--card-border);
      border-radius: 999px;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 3px 10px;
      cursor: pointer;
      line-height: 1.3;
    }
    .card-cat:hover,
    .card-cat:focus {
      background: var(--teal-bg);
      border-color: var(--teal);
      color: var(--teal-dark);
    }
    .card .desc {
      margin: 0 0 16px;
      color: var(--ink);
      flex: 1;
    }
    .card .note {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 1rem;
    }
    .card .badge {
      display: inline-block;
      background: #fff;
      color: var(--teal-dark);
      border: 1px solid var(--card-border);
      border-radius: 4px;
      font-size: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      padding: 2px 8px;
    }
    /* Visually hidden but available to screen readers. */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
    .card .visit {
      align-self: flex-start;
      background: var(--teal);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 999px;
      transition: background 0.15s;
    }
    .card .visit:hover { background: var(--teal-dark); }

    /* --- Status / skeleton --- */
    .status {
      grid-column: 1 / -1;
      padding: 24px 0;
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
    }
    .status.error { color: #9b2c2c; }
    .skeleton-card {
      background: linear-gradient(90deg, #eef4f5, #e2eaec, #eef4f5);
      background-size: 200% 100%;
      animation: shimmer 1.4s linear infinite;
      border-radius: 12px;
      min-height: 220px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    @media (prefers-reduced-motion: reduce) {
      .skeleton-card { animation: none; background: #eef4f5; }
      .card .visit { transition: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1 class="page-title">Research Databases</h1>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <h2 class="sidebar-title">Category Filter</h2>
        <button type="button" class="mobile-toggle" id="catToggle"
                aria-expanded="false" aria-controls="catList">
          <span class="mobile-toggle-label">All</span>
          <span class="mobile-toggle-caret" aria-hidden="true">&#9662;</span>
        </button>
        <ul class="cat-list" id="catList" aria-label="Filter by category">
          <li><button type="button" class="active" data-cat="__all__">All</button></li>
        </ul>
      </aside>

      <section class="grid" id="grid" aria-live="polite" aria-busy="true">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </section>
    </div>
  </main>

  <script>
  (function () {
    "use strict";
    var API_URL = "/api/databases.json";
    var ALL = "__all__";

    function escapeHtml(s) {
      return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;",
                 '"': "&quot;", "'": "&#39;" }[c];
      });
    }

    var allDatabases = []; // deduplicated by slug
    var allCategoryNames = {}; // name -> true (presence set)
    var categoryCounts = {}; // name -> # of unique databases
    var selectedCategory = ALL;

    function ingest(data) {
      var bySlug = {};
      (data.databases || []).forEach(function (db) {
        if (!bySlug[db.slug]) bySlug[db.slug] = db;
        (db.categories || []).forEach(function (c) {
          var name = (c.name || "").trim();
          if (!name) return;
          allCategoryNames[name] = true;
        });
      });
      allDatabases = Object.keys(bySlug).map(function (k) { return bySlug[k]; });
      allDatabases.sort(function (a, b) {
        return String(a.name).toLowerCase()
                 .localeCompare(String(b.name).toLowerCase());
      });
      // Recompute counts (one per unique database per category)
      categoryCounts = {};
      allDatabases.forEach(function (db) {
        (db.categories || []).forEach(function (c) {
          var name = (c.name || "").trim();
          if (!name) return;
          categoryCounts[name] = (categoryCounts[name] || 0) + 1;
        });
      });
    }

    function renderCategoryList() {
      var cats = Object.keys(allCategoryNames).sort(function (a, b) {
        return a.toLowerCase().localeCompare(b.toLowerCase());
      });
      var html = '<li><button type="button" data-cat="' + ALL + '">' +
                 'All <span class="count">(' + allDatabases.length + ')</span>' +
                 "</button></li>";
      cats.forEach(function (cat) {
        html += '<li><button type="button" data-cat="' + escapeHtml(cat) + '">' +
                  escapeHtml(cat) +
                  ' <span class="count">(' + (categoryCounts[cat] || 0) + ')</span>' +
                "</button></li>";
      });
      var list = document.getElementById("catList");
      list.innerHTML = html;
      list.addEventListener("click", function (e) {
        var btn = e.target.closest("button[data-cat]");
        if (!btn) return;
        selectedCategory = btn.getAttribute("data-cat");
        markActive();
        renderGrid();
      });
      markActive();
    }

    function markActive() {
      var btns = document.querySelectorAll("#catList button");
      var activeLabel = "All";
      for (var i = 0; i < btns.length; i++) {
        if (btns[i].getAttribute("data-cat") === selectedCategory) {
          btns[i].classList.add("active");
          // The button text starts with the category name followed by a
          // ".count" span; firstChild is the leading text node.
          if (btns[i].firstChild && btns[i].firstChild.nodeType === 3) {
            activeLabel = btns[i].firstChild.textContent.trim() || activeLabel;
          }
        } else {
          btns[i].classList.remove("active");
        }
      }
      var lbl = document.querySelector(".mobile-toggle-label");
      if (lbl) lbl.textContent = activeLabel;
    }

    function setupMobileToggle() {
      var toggle = document.getElementById("catToggle");
      var sidebar = document.getElementById("sidebar");
      var list = document.getElementById("catList");
      if (!toggle || !sidebar || !list) return;
      toggle.addEventListener("click", function () {
        var open = sidebar.classList.toggle("cat-open");
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
      });
      // Auto-close after picking a category on mobile.
      list.addEventListener("click", function (e) {
        if (!e.target.closest("button[data-cat]")) return;
        if (sidebar.classList.contains("cat-open")) {
          sidebar.classList.remove("cat-open");
          toggle.setAttribute("aria-expanded", "false");
        }
      });
    }

    function renderGrid() {
      var dbs = allDatabases.filter(function (db) {
        if (selectedCategory === ALL) return true;
        return (db.categories || []).some(function (c) {
          return (c.name || "").trim() === selectedCategory;
        });
      });

      var grid = document.getElementById("grid");
      grid.removeAttribute("aria-busy");
      if (!dbs.length) {
        grid.innerHTML = '<p class="status">No databases in this category.</p>';
        return;
      }

      grid.innerHTML = dbs.map(function (db) {
        var url = escapeHtml(db.launch_url);
        var name = escapeHtml(db.name);
        var desc = db.description
          ? '<p class="desc">' + escapeHtml(db.description) + "</p>"
          : '<p class="desc"></p>';
        var note = db.message
          ? '<p class="note">' + escapeHtml(db.message) + "</p>"
          : "";
        var badge = db.remote_access === 3
          ? '<span class="badge">In-library only</span>'
          : "";
        var cats = (db.categories || [])
          .map(function (c) { return (c.name || "").trim(); })
          .filter(function (n) { return n.length; });
        var seen = {};
        cats = cats.filter(function (n) {
          if (seen[n]) return false;
          seen[n] = true;
          return true;
        }).sort(function (a, b) {
          return a.toLowerCase().localeCompare(b.toLowerCase());
        });
        var catChips = cats.length
          ? '<div class="card-cats">' + cats.map(function (n) {
              return '<button type="button" class="card-cat" data-cat="' +
                escapeHtml(n) + '">' + escapeHtml(n) + "</button>";
            }).join("") + "</div>"
          : "";
        return (
          '<article class="card" aria-labelledby="dbh-' + db.slug + '">' +
            '<div class="card-head">' +
              '<h3 id="dbh-' + db.slug + '">' +
                '<a href="' + url + '" target="_blank" rel="noopener">' +
                  name +
                "</a>" +
              "</h3>" +
              badge +
            "</div>" +
            catChips +
            desc + note +
            '<a class="visit" href="' + url +
              '" target="_blank" rel="noopener">' +
              "Visit" +
              '<span class="sr-only"> ' + name +
              ', opens in new tab</span>' +
            "</a>" +
          "</article>"
        );
      }).join("");
    }

    // Delegated click handler for in-card category chips: select that
    // category in the sidebar and re-render.
    document.getElementById("grid").addEventListener("click", function (e) {
      var btn = e.target.closest("button.card-cat");
      if (!btn) return;
      selectedCategory = btn.getAttribute("data-cat");
      markActive();
      renderGrid();
      // Scroll the iframe document up; the parent page will follow because
      // the iframe height auto-resizes and the user's viewport stays put on
      // the embed.
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    function showError(message) {
      var grid = document.getElementById("grid");
      grid.removeAttribute("aria-busy");
      grid.innerHTML =
        '<p class="status error">Could not load databases. ' +
        escapeHtml(message) + "</p>";
    }

    fetch(API_URL, { credentials: "omit" })
      .then(function (r) {
        if (!r.ok) throw new Error("HTTP " + r.status);
        return r.json();
      })
      .then(function (data) {
        ingest(data);
        renderCategoryList();
        setupMobileToggle();
        renderGrid();
      })
      .catch(function (err) {
        showError(err && err.message ? err.message : String(err));
      });

    // Broadcast height to parent for iframe auto-resize (Wix consumer).
    var lastHeight = 0;
    function postHeight() {
      var h = Math.max(
        document.body.scrollHeight,
        document.documentElement.scrollHeight
      );
      if (h && h !== lastHeight && window.parent !== window) {
        lastHeight = h;
        window.parent.postMessage(
          { source: "rhpl-embed", height: h }, "*"
        );
      }
    }
    if (window.ResizeObserver) {
      new ResizeObserver(postHeight).observe(document.body);
    } else {
      window.addEventListener("load", postHeight);
      window.addEventListener("resize", postHeight);
    }
  })();
  </script>
</body>
</html>
