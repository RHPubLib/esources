<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Research Databases{% endblock %} · Rochester Hills Public Library</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ url_for('public.listing') }}">Rochester Hills Public Library</a>
      <span class="brand-sub">Research Databases</span>
    </div>
  </header>

  <main class="wrap">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <a href="https://www.rhpl.org">www.rhpl.org</a>
      <span>&middot; Need help? Ask at any RHPL service desk.</span>
    </div>
  </footer>
</body>
</html>
