title = "RHPL eResources public-repo content scanner"

[extend]
useDefault = true

[[rules]]
id = "rhpl-internal-ip-10-5"
description = "RHPL internal network range 10.5.x.x"
regex = '''\b10\.5\.\d{1,3}\.\d{1,3}\b'''
tags = ["rhpl", "internal-network"]

[[rules]]
id = "rhpl-external-ip-216-150-230"
description = "RHPL external CIDR 216.150.230.x"
regex = '''\b216\.150\.230\.\d{1,3}(/\d{1,2})?\b'''
tags = ["rhpl", "internal-cidr"]

[[rules]]
id = "rhpl-godaddy-host-ip"
description = "GoDaddy hosting IP from older infra references"
regex = '''\b132\.148\.43\.54\b'''
tags = ["rhpl", "internal-host"]

[[rules]]
id = "rhpl-internal-hostname"
description = "RHPL internal server hostnames (d-webL01, d-radius01, etc.)"
regex = '''\bd-(web|radius|sql|api|db)L?\d{1,3}\b'''
tags = ["rhpl", "internal-host"]

[[rules]]
id = "rhpl-localai-host"
description = "RHPL on-prem AI server hostnames"
regex = '''\blocalai(\.rhpl\.org|\.rhpl\.local|\.ad\.rhpl\.org)\b'''
tags = ["rhpl", "internal-host"]

[[rules]]
id = "rhpl-admin-user"
description = "RHPL admin/service usernames in deployment context"
regex = '''\b(youruser|youruser)\b'''
tags = ["rhpl", "internal-user"]

[[rules]]
id = "rhpl-polaris-orgid-branch-names"
description = "RHPL-specific Polaris branch names that appear in OrgID enumerations"
regex = '''\b(Avon on the Lake|Avon Tower|Danish Village|Bellbrook|Waltonwood|Kids'? Bus)\b'''
tags = ["rhpl", "internal-orgid"]

[[rules]]
id = "rhpl-google-client-id-prefix"
description = "The specific Google OAuth client ID prefix used by RHPL Web Services"
regex = '''\b310402963061-[a-z0-9]+\b'''
tags = ["rhpl", "oauth"]

[allowlist]
description = "Paths and patterns that are OK to contain matches"
paths = [
  '''README\.md''',  # mentions of your-eresources-domain.org as reference deployment are fine
  '''AGENTS\.md''',  # rule file itself enumerates forbidden patterns
  '''\.gitleaks\.toml''',  # config file documents its own rules
]
